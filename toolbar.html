<div id="input_helper_toolbar" class="input-helper-toolbar">
  <button
    id="input_undo_btn"
    class="input-helper-btn"
    title="撤回"
    data-norefocus="true"
  >
    <i class="fa-solid fa-rotate-left"></i>
  </button>
  <button
    id="input_redo_btn"
    class="input-helper-btn"
    title="重做"
    data-norefocus="true"
  >
    <i class="fa-solid fa-rotate-right"></i>
  </button>
  <button
    id="input_shift_btn"
    class="input-helper-btn"
    title="选中模式"
    data-norefocus="true"
  >
    <i class="fa-solid fa-up-down-left-right"></i>
  </button>
  <button
    id="input_asterisk_btn"
    class="input-helper-btn"
    title="双星号"
    data-norefocus="true"
  >
    **
  </button>
  <button
    id="input_quotes_btn"
    class="input-helper-btn"
    title="双引号"
    data-norefocus="true"
  >
    ""
  </button>
  <button
    id="input_parentheses_btn"
    class="input-helper-btn"
    title="圆括号"
    data-norefocus="true"
  >
    ()
  </button>
  <button
    id="input_book_quotes1_btn"
    class="input-helper-btn"
    title="直角引号「」"
    data-norefocus="true"
  >
    「」
  </button>
  <button
    id="input_book_quotes2_btn"
    class="input-helper-btn"
    title="直角引号『』"
    data-norefocus="true"
  >
    『』
  </button>
  <button
    id="input_book_quotes3_btn"
    class="input-helper-btn"
    title="书名号《》"
    data-norefocus="true"
  >
    《》
  </button>
  <button
    id="input_newline_btn"
    class="input-helper-btn"
    title="换行"
    data-norefocus="true"
  >
    <i class="fa-solid fa-turn-down"></i>
  </button>
  <button
    id="input_user_btn"
    class="input-helper-btn"
    title="用户标记 {{user}}"
    data-norefocus="true"
  >
    <i class="fa-solid fa-user"></i>
  </button>
  <button
    id="input_char_btn"
    class="input-helper-btn"
    title="角色标记 {{char}}"
    data-norefocus="true"
  >
    <i class="fa-solid fa-robot"></i>
  </button>
  <button
    id="input_scroll_top_btn"
    class="input-helper-btn"
    title="跳转聊天顶部"
    data-norefocus="true"
  >
    <i class="fa-solid fa-angles-up"></i>
  </button>
  <button
    id="input_scroll_last_ai_btn"
    class="input-helper-btn"
    title="跳转最后AI消息顶部"
    data-norefocus="true"
  >
    <i class="fa-solid fa-arrow-up"></i>
  </button>
  <button
    id="input_scroll_bottom_btn"
    class="input-helper-btn"
    title="跳转聊天底部"
    data-norefocus="true"
  >
    <i class="fa-solid fa-arrow-down"></i>
  </button>
  <button
    id="input_prev_ai_msg_btn"
    class="input-helper-btn"
    title="上一条AI消息"
    data-norefocus="true"
  >
    <i class="fa-solid fa-chevron-up"></i>
  </button>
  <button
    id="input_next_ai_msg_btn"
    class="input-helper-btn"
    title="下一条AI消息"
    data-norefocus="true"
  >
    <i class="fa-solid fa-chevron-down"></i>
  </button>
  <button
    id="input_paging_mode_btn"
    class="input-helper-btn"
    title="翻页模式"
    data-norefocus="true"
  >
    <i class="fa-solid fa-book-open"></i>
  </button>
  <button
    id="input_auto_scroll_btn"
    class="input-helper-btn"
    title="自动滚动"
    data-norefocus="true"
  >
    <i class="fa-solid fa-gauge-high"></i>
  </button>
  <button
    id="input_delete_last_msg_btn"
    class="input-helper-btn"
    title="删除最后消息"
    data-norefocus="true"
  >
    <i class="fa-solid fa-trash"></i>
  </button>
  <button
    id="input_delete_last_swipe_btn"
    class="input-helper-btn"
    title="删除当前备选"
    data-norefocus="true"
  >
    <i class="fa-solid fa-scissors"></i>
  </button>
  <button
    id="input_continue_reply_btn"
    class="input-helper-btn"
    title="继续回复"
    data-norefocus="true"
  >
    <i class="fa-solid fa-forward"></i>
  </button>
  <button
    id="input_regenerate_reply_btn"
    class="input-helper-btn"
    title="重新生成"
    data-norefocus="true"
  >
    <i class="fa-solid fa-rotate"></i>
  </button>
  <button
    id="input_hide_manager_btn"
    class="input-helper-btn"
    title="消息隐藏管理"
    data-norefocus="true"
  >
    <i class="fa-solid fa-ghost"></i>
  </button>
</div>
